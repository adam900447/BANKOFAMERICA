<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank of America — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Inherited Styles from Login Page ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C; --gold-light: #E8CC7A; --gold-dim: rgba(201,168,76,0.15);
      --dark: #080B10; --dark-2: #0E1219; --dark-3: #151B25; --dark-4: #1C2433;
      --text-primary: #F0EDE8; --text-secondary: #8A8F9A; --text-dim: #4A5060;
      --border: rgba(201,168,76,0.2); --border-dim: rgba(255,255,255,0.06);
    }
    html, body { height: 100%; background: var(--dark); color: var(--text-primary); font-family: 'Outfit', sans-serif; overflow: auto; }
    
    /* ── Layout & Visuals ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--dark) url('back.jpg') center/cover no-repeat;
      background-blend-mode: overlay;
    }
    .layout { position: relative; z-index: 1; min-height: 100vh; display: grid; grid-template-columns: 1fr 480px; }
    .left-panel { display: flex; flex-direction: column; justify-content: space-between; padding: 3rem; border-right: 1px solid var(--border-dim); }
    .right-panel { background: var(--dark-2); display: flex; flex-direction: column; justify-content: center; padding: 3rem 2.5rem; }
    
    /* ── Form Styling ── */
    .form-header { margin-bottom: 2rem; }
    .form-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--text-primary); margin-bottom: 0.5rem; }
    .field { margin-bottom: 1.25rem; }
    .field-label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.5rem; font-family: 'DM Mono', monospace; }
    .field input { width: 100%; padding: 0.85rem; font-family: 'Outfit', sans-serif; background: var(--dark-3); border: 1px solid var(--border-dim); border-radius: 10px; color: var(--text-primary); outline: none; }
    .field input:focus { border-color: var(--gold); background: var(--dark-4); }
    
    /* ── Buttons ── */
    .submit-btn { width: 100%; padding: 0.95rem; font-family: 'Outfit', sans-serif; text-transform: uppercase; background: var(--gold); color: var(--dark); border: none; border-radius: 10px; cursor: pointer; font-weight: 500; margin-top: 1rem; }
    
    /* ── Animations ── */
    .fade-up { opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .left-panel { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="layout">
    <div class="left-panel">
      <div class="brand">
        <span class="brand-name" style="font-family:'Cormorant Garamond', serif;">BANK OF <span>AMERICA</span></span>
      </div>
    </div>

    <div class="right-panel">
      <div class="form-header fade-up">
        <h2 class="form-title">Create your account.</h2>
        <p style="color: var(--text-secondary); font-size: 13px;">Join the next generation of private banking.</p>
      </div>

      <div class="field fade-up">
        <label class="field-label">Full Name</label>
        <input type="text" id="fullname" placeholder="Enter your full name"/>
      </div>

      <div class="field fade-up">
        <label class="field-label">Email Address</label>
        <input type="email" id="email" placeholder="name@example.com"/>
      </div>

      <div class="field fade-up">
        <label class="field-label">Password</label>
        <input type="password" id="password" placeholder="••••••••••••"/>
      </div>

      <button class="submit-btn fade-up" onclick="handleSignup()">Sign Up</button>
      
      <p style="text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 1.5rem;">
        Already registered? <a href="login.html" style="color: var(--gold);">Login to your account</a>
      </p>
    </div>
  </div>

  <script>
 async function handleSignup() {
  const name = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!name || !email || !password) {
    showMsg('Please fill in all fields.', true);
    return;
  }

  if (password.length < 6) {
    showMsg('Password must be at least 6 characters.', true);
    return;
  }

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (data.success) {
      showMsg('Account created! Redirecting to login...', false);
      setTimeout(() => window.location.href = 'login.html', 1500);
    } else {
      showMsg(data.message || 'Signup failed.', true);
    }
  } catch (err) {
    showMsg('Connection error. Please try again.', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign Up';
  }
}

function showMsg(text, isError) {
  // reuse existing msg-box if present, otherwise create one
  let box = document.getElementById('msg-box');
  if (!box) {
    box = document.createElement('div');
    box.id = 'msg-box';
    box.style.cssText = 'padding:0.75rem 1rem;border-radius:8px;font-size:13px;margin-bottom:1rem;font-weight:300;';
    document.querySelector('.submit-btn').before(box);
  }
  box.textContent = text;
  box.style.background = isError ? 'rgba(220,60,60,0.1)' : 'rgba(201,168,76,0.1)';
  box.style.border = isError ? '1px solid rgba(220,60,60,0.2)' : '1px solid rgba(201,168,76,0.2)';
  box.style.color = isError ? '#F08080' : '#E8CC7A';
  box.style.display = 'block';
}
  </script>

</body>
</html>
