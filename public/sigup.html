<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank of America — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C; --gold-light: #E8CC7A; --gold-dim: rgba(201,168,76,0.15);
      --dark: #080B10; --dark-2: #0E1219; --dark-3: #151B25; --dark-4: #1C2433;
      --text-primary: #F0EDE8; --text-secondary: #8A8F9A; --text-dim: #4A5060;
      --border: rgba(201,168,76,0.2); --border-dim: rgba(255,255,255,0.06);
    }
    html, body { height: 100%; background: var(--dark); color: var(--text-primary); font-family: 'Outfit', sans-serif; overflow: auto; }
    .bg { position: fixed; inset: 0; z-index: 0; background: var(--dark) url('back.jpg') center/cover no-repeat; background-blend-mode: overlay; }
    .layout { position: relative; z-index: 1; min-height: 100vh; display: grid; grid-template-columns: 1fr 480px; }
    .left-panel { display: flex; flex-direction: column; justify-content: space-between; padding: 3rem; border-right: 1px solid var(--border-dim); }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; letter-spacing: 0.08em; color: var(--text-primary); }
    .brand-name span { color: var(--gold); }
    .right-panel { background: var(--dark-2); display: flex; flex-direction: column; justify-content: center; padding: 3rem 2.5rem; position: relative; overflow: hidden; }
    .right-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5; }
    .form-header { margin-bottom: 2rem; }
    .form-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--text-primary); margin-bottom: 0.5rem; }
    .field { margin-bottom: 1.25rem; }
    .field-label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.5rem; font-family: 'DM Mono', monospace; letter-spacing: 0.12em; }
    .field-wrap { position: relative; display: flex; align-items: center; }
    .field-icon { position: absolute; left: 14px; color: var(--text-dim); pointer-events: none; transition: color 0.2s; }
    .field-wrap:focus-within .field-icon { color: var(--gold); }
    .field input { width: 100%; padding: 0.85rem 0.85rem 0.85rem 2.75rem; font-family: 'Outfit', sans-serif; font-size: 14px; background: var(--dark-3); border: 1px solid var(--border-dim); border-radius: 10px; color: var(--text-primary); outline: none; transition: border-color 0.25s, background 0.25s, box-shadow 0.25s; }
    .field input::placeholder { color: var(--text-dim); }
    .field input:focus { border-color: var(--border); background: var(--dark-4); box-shadow: 0 0 0 3px rgba(201,168,76,0.08); }
    .submit-btn { width: 100%; padding: 0.95rem; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; background: linear-gradient(135deg, var(--gold) 0%, #A8863A 100%); color: var(--dark); border: none; border-radius: 10px; cursor: pointer; position: relative; overflow: hidden; transition: opacity 0.2s, transform 0.15s; margin-top: 1rem; }
    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.985); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg-box { display: none; padding: 0.75rem 1rem; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; font-weight: 300; }
    .msg-box.error { background: rgba(220,60,60,0.1); border: 1px solid rgba(220,60,60,0.2); color: #F08080; }
    .msg-box.success { background: rgba(201,168,76,0.1); border: 1px solid var(--border); color: var(--gold-light); }
    .fade-up { opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .left-panel { display: none; } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="layout">
    <div class="left-panel">
      <div class="brand">
        <span class="brand-name">Bank of <span>America</span></span>
      </div>
    </div>

    <div class="right-panel">
      <div class="form-header fade-up">
        <h2 class="form-title">Create your account.</h2>
        <p style="color: var(--text-secondary); font-size: 13px;">Join the next generation of private banking.</p>
      </div>

      <div class="msg-box" id="msg-box"></div>

      <div class="field fade-up">
        <label class="field-label">Full Name</label>
        <div class="field-wrap">
          <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="fullname" placeholder="Enter your full name"/>
        </div>
      </div>

      <div class="field fade-up">
        <label class="field-label">Email Address</label>
        <div class="field-wrap">
          <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" placeholder="name@example.com"/>
        </div>
      </div>

      <div class="field fade-up">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="password" placeholder="••••••••••••"/>
        </div>
      </div>

      <button class="submit-btn fade-up" id="signup-btn" onclick="handleSignup()">Create Account</button>

      <p style="text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 1.5rem;">
        Already registered? <a href="login.html" style="color: var(--gold);">Login to your account</a>
      </p>
    </div>
  </div>

  <script>
    function showMsg(text, isError) {
      const box = document.getElementById('msg-box');
      box.textContent = text;
      box.className = 'msg-box ' + (isError ? 'error' : 'success');
      box.style.display = 'block';
    }

    async function handleSignup() {
      const name = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) {
        showMsg('Please fill in all fields.', true);
        return;
      }

      if (password.length < 6) {
        showMsg('Password must be at least 6 characters.', true);
        return;
      }

      const btn = document.getElementById('signup-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (data.success) {
          showMsg('Account created! Redirecting to login...', false);
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          showMsg(data.message || 'Signup failed.', true);
        }
      } catch (err) {
        showMsg('Connection error. Is the server running?', true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
  </script>
</body>
</html>
